<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Template</title>
</head>
<body>
  <img id="logo" alt="Business logo" style="max-width:160px;">
  <h1 id="businessName"></h1>
  <p id="tagline"></p>

  <script type="module">
    import { CONFIG } from "./config/config.js";

    document.getElementById("logo").src = CONFIG.branding.logo;
    document.getElementById("businessName").textContent = CONFIG.business.name;
    document.getElementById("tagline").textContent = CONFIG.business.tagline;

    document.documentElement.style.setProperty("--brand", CONFIG.branding.primaryColor);
    document.documentElement.style.setProperty("--bg", CONFIG.branding.backgroundColor);
    document.documentElement.style.setProperty("--text", CONFIG.branding.textColor);
  </script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-content: center;
      text-align: center;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      color: var(--brand);
    }
  </style>
</body>
</html>
